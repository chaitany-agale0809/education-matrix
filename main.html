<!DOCTYPE html>
<html>
<head>
    <title>Main Page</title>
    <style>

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        /* Full background image */
        body {
            background: url("image/bg.jpg") center/cover no-repeat;
            font-family: Arial, sans-serif;
        }

        /* Overlay for better text visibility */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.45);
            z-index: 1;
        }

        /* Running animated heading */
        .runner {
            position: relative;
            z-index: 2;
            font-size: 3rem;
            color: #ffcb05;
            text-shadow: 0 0 10px #000, 0 0 20px #ffcb05;
            animation: slideRight 10s linear infinite;
            white-space: nowrap;
            margin: 10px;
        }
        @keyframes slideRight {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .main {
            position: relative;
            z-index: 2;
            width: 100%;
            min-height: 700px;
            padding-top: 40px;
        }

        .main1 {
            text-align: center;
        }
        .div1 {
            width: 200px;
            margin: auto;
            border: 3px solid #fff;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        .div1:hover {
            transform: scale(1.1);
            box-shadow: 0px 8px 20px rgba(255, 255, 255, 0.6);
        }
        .div1 img {
            width: 100%;
            object-fit: cover;
        }
        .div1 h4 {
            margin-top: 8px;
            color: #fff;
            font-size: 16px;
        }

        .main2 {
            width: 100%;
            height: 180px;
            position: relative;
        }

        /* Diamond boxes hover enhance */
        .main2 div {
            width: 100px;
            height: 100px;
            transform: rotate(45deg);
            border: 2px solid #fff;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
        }
        .main2 div:hover {
            transform: rotate(45deg) scale(1.2);
            background: yellow;
            color: #000;
            box-shadow: 0px 0px 18px rgba(255, 255, 0, 0.8);
        }

        .main2 .div2 { left: 5%; background: #708238; }
        .main2 .div3 { left: 32%; background: #A7F3D0; }
        .main2 .div4 { left: 59%; background: #FBCFE8; }
        .main2 .div5 { left: 86%; background: #CC7722; }

        .main2 h2 {
            transform: rotate(-45deg);
            margin: 0;
            font-size: 20px;
            color: white;
            text-shadow: 0px 0px 8px rgba(0,0,0,0.6);
        }

    </style>
</head>

<body>

    <div class="overlay"></div>

    <h1 class="runner">𝔼𝕕𝕦𝕔𝕒𝕥𝕚𝕠𝕟 𝕄𝕒𝕥𝕣𝕚𝕩</h1>

    <div class="main">

        <div class="main1">
            <div class="div1">
                <a href="https://sim.unipune.ac.in/sim_app/login/login" target="_blank">
                    <img src="image/sppu.jpg" alt="SPPU Login">
                </a>
                <h4>Click the image for SPPU student login</h4>
            </div>
        </div>

        <div class="main2">
             <a href="fe.html"><div class="div2"><h2>F. E.</h2></div></a>
             <a href="se.html"><div class="div3"><h2>S. E.</h2></div></a>
             <a href="te.html"><div class="div4"><h2>T. E.</h2></div></a>
             <a href="be.html"><div class="div5"><h2>B. E.</h2></div></a>
        </div>

    </div>

</body>
</html>
