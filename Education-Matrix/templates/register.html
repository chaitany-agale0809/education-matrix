<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Register — Education Matrix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,#ff7eb3,#ff758c);display:flex;justify-content:center;align-items:center;padding:20px;}
.box{width:380px;padding:35px;background:rgba(255,255,255,0.1);border-radius:15px;backdrop-filter:blur(10px);box-shadow:0 8px 32px rgba(0,0,0,0.2);text-align:center;color:white;}
h2{margin-bottom:25px;font-size:26px;}
.input-box{margin-bottom:15px;}
.input-box input{width:100%;padding:12px;border:none;border-radius:8px;outline:none;background:rgba(255,255,255,0.2);color:white;font-size:15px;}
.input-box input::placeholder{color:#eee;}
.btn{width:100%;padding:12px;border:none;border-radius:8px;background:#fff;color:#333;font-weight:bold;cursor:pointer;font-size:15px;transition:0.3s;}
.btn:hover{background:#f0f0f0;}
.error{background:rgba(255,80,80,0.3);border:1px solid #ff5050;border-radius:8px;padding:10px;margin-bottom:15px;font-size:14px;}
.extra{margin-top:15px;font-size:14px;}
.extra a{color:white;text-decoration:none;}
.extra a:hover{text-decoration:underline;}
.logo{font-size:13px;margin-bottom:8px;color:#ffe;letter-spacing:2px;}
</style>
</head>
<body>
<div class="box">
  <p class="logo">EDUCATION MATRIX</p>
  <h2>Create Account</h2>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST" action="/register">
    <div class="input-box"><input type="text" name="name" placeholder="Full Name" required></div>
    <div class="input-box"><input type="email" name="email" placeholder="Email address" required></div>
    <div class="input-box"><input type="password" name="password" placeholder="Password" required></div>
    <div class="input-box"><input type="password" name="confirm_password" placeholder="Confirm Password" required></div>
    <button class="btn">Register</button>
    <div class="extra"><p>Already have account? <a href="/login">Login</a></p></div>
    <div class="extra"><p><a href="/">← Back to Home</a></p></div>
  </form>
</div>
</body>
</html>
