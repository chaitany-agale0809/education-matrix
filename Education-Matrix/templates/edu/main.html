<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Education Matrix — Main</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:url("/static/image/bg.jpg") center/cover no-repeat fixed;color:white;padding-bottom:70px;}
.overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.72);z-index:1;pointer-events:none;}
.header{position:relative;z-index:2;text-align:center;padding:18px;font-size:22px;color:#ffcb05;font-weight:bold;letter-spacing:1px;}
.search-box{position:relative;z-index:2;padding:10px 15px;text-align:center;}
.search-box input{width:92%;padding:11px 16px;border-radius:12px;border:none;outline:none;font-size:15px;background:rgba(255,255,255,0.9);color:#333;}
.card{position:relative;z-index:2;margin:15px auto;padding:15px;border-radius:15px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);text-align:center;max-width:420px;}
.image-container{width:55%;height:190px;margin:auto;overflow:hidden;border-radius:10px;}
.image-container img{width:100%;height:100%;object-fit:cover;}
.card p{margin-top:10px;font-size:15px;color:#ddd;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:15px 20px;z-index:2;position:relative;max-width:480px;margin:auto;}
.box{padding:22px;border-radius:12px;text-align:center;font-weight:bold;font-size:18px;cursor:pointer;transition:0.3s;letter-spacing:1px;}
.box:hover{transform:scale(1.05);filter:brightness(1.2);}
.fe{background:#708238;}.se{background:#34d399;color:#084;}.te{background:#f472b6;color:#700;}.be{background:#d97706;}
a{text-decoration:none;color:white;}
.bottom-nav{position:fixed;bottom:0;width:100%;height:58px;background:rgba(0,0,0,0.95);display:flex;justify-content:space-around;align-items:center;z-index:10;}
.bottom-nav div{text-align:center;font-size:11px;cursor:pointer;color:#aaa;transition:0.3s;}
.bottom-nav div:hover{color:#00fff0;}
.bottom-nav i{display:block;font-size:22px;margin-bottom:2px;}
.modal{display:none;position:fixed;z-index:20;width:100%;height:100%;background:rgba(0,0,0,0.85);top:0;left:0;}
.modal-content{background:white;color:black;margin:8% auto;padding:20px;width:90%;max-width:600px;border-radius:12px;}
.modal-content h3{margin-bottom:12px;color:#1e3c72;}
iframe{width:100%;height:420px;border:none;}
.modal-content button{margin-top:12px;padding:8px 20px;background:#1e3c72;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px;}
.section-label{position:relative;z-index:2;text-align:center;color:#ffcb05;font-size:13px;letter-spacing:2px;margin-top:5px;}
@media(max-width:480px){.grid{max-width:100%;}.image-container{width:65%;}}
</style>
</head>
<body>
<div class="overlay"></div>
<div class="header">📚 Education Matrix</div>
<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search year (FE, SE, TE, BE)..." onkeyup="searchFunction(this.value)">
</div>
<div class="card">
  <a href="https://sim.unipune.ac.in/sim_app/login/login" target="_blank">
    <div class="image-container"><img src="/static/image/sppu.jpg" alt="SPPU"></div>
    <p>🎓 SPPU Student Login</p>
  </a>
</div>
<p class="section-label">SELECT YOUR YEAR</p>
<div class="grid">
  <a href="/edu/fe"><div class="box fe" data-name="fe first year">F.E</div></a>
  <a href="/edu/se"><div class="box se" data-name="se second year">S.E</div></a>
  <a href="/edu/te"><div class="box te" data-name="te third year">T.E</div></a>
  <a href="/edu/be"><div class="box be" data-name="be fourth year">B.E</div></a>
</div>
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>📄 PDF Viewer</h3>
    <iframe id="pdfFrame"></iframe>
    <button onclick="closeModal()">✕ Close</button>
  </div>
</div>
<div class="bottom-nav">
  <div onclick="window.location.href='/dashboard'"><i class="material-icons">home</i>Home</div>
  <div onclick="document.getElementById('searchInput').focus()"><i class="material-icons">search</i>Search</div>
  <div onclick="window.location.href='https://sim.unipune.ac.in/sim_app/login/login'" ><i class="material-icons">school</i>SPPU</div>
  <div onclick="window.location.href='/logout'"><i class="material-icons">logout</i>Logout</div>
</div>
<script>
function searchFunction(value){
  let boxes=document.querySelectorAll(".box");
  value=value.toLowerCase();
  boxes.forEach(box=>{
    let name=(box.dataset.name||box.innerText).toLowerCase();
    box.parentElement.style.display=name.includes(value)?"block":"none";
  });
}
function openPDF(file){
  document.getElementById("modal").style.display="block";
  document.getElementById("pdfFrame").src=file;
}
function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("pdfFrame").src="";
}
</script>
</body>
</html>
