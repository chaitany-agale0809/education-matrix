<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Second Year Engineering — Education Matrix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;padding:30px 20px;}
.badge{background:#34d399;color:#000;font-weight:bold;font-size:28px;width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 0 30px #34d39988;}
h1{font-size:28px;margin-bottom:10px;text-align:center;}
p{color:#aaa;margin-bottom:30px;text-align:center;}
.coming-soon{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:15px;padding:30px 40px;text-align:center;backdrop-filter:blur(10px);}
.coming-soon h2{color:#34d399;font-size:22px;margin-bottom:10px;}
.coming-soon p{color:#ccc;font-size:15px;margin:0;}
.back-btn{display:inline-block;margin-top:30px;padding:12px 28px;border:2px solid #34d399;color:#34d399;text-decoration:none;border-radius:30px;transition:0.3s;font-size:15px;}
.back-btn:hover{background:#34d399;color:black;}
</style>
</head>
<body>
<div class="badge">S.E</div>
<h1>Second Year Engineering</h1>
<p>SPPU — Education Matrix</p>
<div class="coming-soon">
  <h2>🚧 Coming Soon</h2>
  <p>Study materials for Second Year are being added.<br>Check back soon!</p>
</div>
<a href="/edu/main" class="back-btn">← Back to Years</a>
</body>
</html>
