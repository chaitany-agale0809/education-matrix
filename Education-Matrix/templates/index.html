<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Education Matrix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Arial',sans-serif;}
body{height:100vh;background:linear-gradient(135deg,#1e3c72,#2a5298);display:flex;align-items:center;justify-content:center;overflow:hidden;color:white;}
.box{text-align:center;z-index:2;padding:40px;}
.glitch{font-size:42px;position:relative;color:#00fff0;animation:glitch 1s infinite;}
.glitch::before,.glitch::after{content:attr(data-text);position:absolute;left:0;width:100%;background:transparent;}
.glitch::before{top:-2px;color:#ff004c;animation:glitchTop 0.8s infinite;}
.glitch::after{top:2px;color:#00ff6a;animation:glitchBottom 0.6s infinite;}
@keyframes glitch{0%{transform:skew(0deg);}20%{transform:skew(2deg);}40%{transform:skew(-2deg);}60%{transform:skew(1deg);}80%{transform:skew(-1deg);}100%{transform:skew(0deg);}}
@keyframes glitchTop{0%{clip-path:inset(0 0 80% 0);}50%{clip-path:inset(0 0 20% 0);}100%{clip-path:inset(0 0 80% 0);}}
@keyframes glitchBottom{0%{clip-path:inset(80% 0 0 0);}50%{clip-path:inset(20% 0 0 0);}100%{clip-path:inset(80% 0 0 0);}}
.subtitle{margin-top:15px;font-size:18px;color:#cce;}
.btn-group{margin-top:40px;display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.btn{padding:14px 35px;font-size:16px;border-radius:30px;cursor:pointer;font-weight:bold;text-decoration:none;transition:0.3s;}
.btn-login{background:transparent;border:2px solid #00fff0;color:#00fff0;}
.btn-login:hover{background:#00fff0;color:black;box-shadow:0 0 20px #00fff0;}
.btn-register{background:#00fff0;border:2px solid #00fff0;color:black;}
.btn-register:hover{background:transparent;color:#00fff0;box-shadow:0 0 20px #00fff0;}
.flash{position:fixed;inset:0;background:white;opacity:0;animation:lightning 4s infinite;pointer-events:none;}
@keyframes lightning{0%,95%,100%{opacity:0;}96%{opacity:0.4;}97%{opacity:0;}98%{opacity:0.3;}}
</style>
</head>
<body>
<div class="flash"></div>
<div class="box">
  <h1 class="glitch" data-text="EDUCATION MATRIX">EDUCATION MATRIX</h1>
  <p class="subtitle">Engineering Knowledge Hub — SPPU</p>
  <div class="btn-group">
    <a href="/login" class="btn btn-login">Login</a>
    <a href="/register" class="btn btn-register">Register</a>
  </div>
</div>
</body>
</html>
